<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balkin Nutrition | Science Backed. Market Ready.</title>

  <style>
    :root {
      --header-h: 92px;
      --section-y: 36px;
      --navy: #071A2D;
      --navy-soft: #0E2A43;
      --teal: #3DA7A2;
      --teal-deep: #1F7F7A;
      --graphite: #2E3740;
      --mist: #EFF5F3;
      --white: #FFFFFF;
      --warm: #F8FBFA;
      --line: rgba(7, 26, 45, 0.1);
      --glass: rgba(255,255,255,0.72);
      --shadow: 0 30px 80px rgba(7, 26, 45, 0.16);
      --radius: 28px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-h) + 18px);
    }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--mist);
      color: var(--graphite);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at 85% 2%, rgba(61, 167, 162, 0.2), transparent 34rem),
        radial-gradient(circle at 5% 30%, rgba(7, 26, 45, 0.08), transparent 28rem),
        linear-gradient(135deg, #F7FBFA 0%, #EFF5F3 58%, #E7F0EE 100%);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(239, 245, 243, 0.86);
      border-bottom: 1px solid rgba(7, 26, 45, 0.08);
    }

    .nav {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: var(--navy);
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .wordmark strong {
      font-size: 1.22rem;
      font-weight: 840;
    }

    .wordmark span {
      margin-top: 7px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--teal-deep);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.91rem;
      font-weight: 680;
    }

    .nav-links a {
      color: rgba(46, 55, 64, 0.76);
      text-decoration: none;
    }

    .nav-links a:hover { color: var(--navy); }

    .nav-cta {
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--navy);
      color: var(--white) !important;
      box-shadow: 0 14px 35px rgba(7, 26, 45, 0.18);
    }

    main, footer {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .hero {
      min-height: calc(100svh - var(--header-h));
      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      align-items: center;
      gap: 38px;
      padding: 26px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border: 1px solid rgba(31, 127, 122, 0.25);
      border-radius: 999px;
      color: var(--teal-deep);
      background: rgba(255, 255, 255, 0.64);
      font-weight: 780;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 6px rgba(61, 167, 162, 0.14);
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(3rem, 5vw, 5.25rem);
      line-height: 0.95;
      letter-spacing: -0.075em;
      max-width: 790px;
    }

    .lead {
      margin: 20px 0 0;
      max-width: 620px;
      color: rgba(46, 55, 64, 0.78);
      font-size: clamp(1rem, 1.12vw, 1.1rem);
      line-height: 1.5;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 780;
      transition: transform 180ms ease, box-shadow 180ms ease;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .button:hover { transform: translateY(-2px); }

    .button.primary {
      background: var(--navy);
      color: var(--white);
      box-shadow: 0 20px 46px rgba(7, 26, 45, 0.23);
    }

    .button.secondary {
      color: var(--navy);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(7, 26, 45, 0.11);
    }

    .proof-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 22px;
      max-width: 640px;
    }

    .proof-card {
      padding: 13px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(7, 26, 45, 0.08);
      box-shadow: 0 18px 45px rgba(7, 26, 45, 0.06);
    }

    .proof-card strong {
      display: block;
      color: var(--navy);
      font-size: 1.12rem;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .proof-card span {
      color: rgba(46, 55, 64, 0.68);
      font-size: 0.8rem;
      line-height: 1.28;
    }

    .brand-panel {
      position: relative;
      min-height: 480px;
      border-radius: 40px;
      padding: 20px;
      background:
        linear-gradient(145deg, rgba(7, 26, 45, 0.98), rgba(14, 42, 67, 0.96)),
        radial-gradient(circle at 20% 20%, rgba(61, 167, 162, 0.22), transparent 20rem);
      box-shadow: var(--shadow);
      overflow: hidden;
      color: var(--white);
    }

    .brand-panel::before,
    .brand-panel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .brand-panel::before {
      inset: auto -150px -190px auto;
      width: 430px;
      height: 430px;
      background: rgba(61, 167, 162, 0.2);
      filter: blur(10px);
    }

    .brand-panel::after {
      top: 58px;
      right: 58px;
      width: 160px;
      height: 160px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-inner {
      position: relative;
      z-index: 1;
      min-height: 440px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo-stage {
      display: grid;
      place-items: center;
      flex: 1;
      padding: 12px 0 18px;
    }

    .hero-logo {
      width: min(310px, 78%);
      height: auto;
      overflow: visible;
    }

    .animated-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .animated-line.delay-1 { animation-delay: 0.18s; }
    .animated-line.delay-2 { animation-delay: 0.36s; }
    .animated-line.delay-3 { animation-delay: 0.54s; }
    .animated-line.delay-4 { animation-delay: 0.72s; }

    .node {
      opacity: 0;
      transform-origin: center;
      animation: nodeIn 520ms ease forwards;
    }

    .node.delay-1 { animation-delay: 0.1s; }
    .node.delay-2 { animation-delay: 0.28s; }
    .node.delay-3 { animation-delay: 0.46s; }
    .node.delay-4 { animation-delay: 0.64s; }
    .node.delay-5 { animation-delay: 0.82s; }
    .node.delay-6 { animation-delay: 1s; }

    .logo-word-reveal {
      opacity: 0;
      transform: translateY(12px);
      animation: wordIn 680ms ease forwards 1.62s;
    }

    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes nodeIn { from { opacity: 0; transform: scale(0.55); } to { opacity: 1; transform: scale(1); } }
    @keyframes wordIn { to { opacity: 1; transform: translateY(0); } }

    .panel-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(12px);
    }

    .meta-card span {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.72rem;
      font-weight: 780;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .meta-card strong {
      font-size: 0.88rem;
      line-height: 1.28;
    }

    section {
      min-height: auto;
      padding: 56px 0;
      display: block;
      scroll-margin-top: calc(var(--header-h) + 18px);
    }

    #services-title,
    #founder-title,
    #process-title,
    #testimonial-title,
    #contact-title {
      scroll-margin-top: calc(var(--header-h) + 18px);
    }

    .section-head {
      display: block;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(1.9rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.055em;
      max-width: 760px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .service-card,
    .card,
    .value-card,
    .testimonial-card {
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(7, 26, 45, 0.08);
      box-shadow: 0 20px 50px rgba(7, 26, 45, 0.07);
      overflow: hidden;
    }

    .service-card {
      padding: 18px;
      min-height: 0;
      display: grid;
      grid-template-rows: 56px 122px auto;
      align-content: start;
      row-gap: 12px;
    }

    .service-card > div {
      display: contents;
    }

    .service-card h3 {
      margin: 0;
      color: var(--navy);
      letter-spacing: -0.03em;
      font-size: 1.1rem;
      line-height: 1.22;
      align-self: end;
    }

    .service-card p {
      margin: 0;
      color: rgba(46, 55, 64, 0.72);
      line-height: 1.42;
      font-size: 0.88rem;
    }

    .service-card ul,
    .mini-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 7px;
    }

    .service-card li,
    .mini-list li {
      position: relative;
      padding-left: 18px;
      color: rgba(46, 55, 64, 0.74);
      font-size: 0.84rem;
      line-height: 1.36;
    }

    .service-card li::before,
    .mini-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.63em;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
    }

    .story-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 18px;
      align-items: start;
    }

    .founder-card {
      padding: 28px;
      border-radius: 36px;
      background: var(--navy);
      color: var(--white);
      min-height: auto;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .founder-card::before {
      content: "";
      position: absolute;
      top: -130px;
      right: -115px;
      width: 330px;
      height: 330px;
      border-radius: 50%;
      background: rgba(61, 167, 162, 0.22);
    }

    .founder-card > * {
      position: relative;
      z-index: 1;
    }

    .founder-content {
      display: block;
      padding-right: 190px;
    }

    .founder-copy {
      min-width: 0;
    }

    .founder-image-wrap {
      position: absolute;
      top: 34px;
      right: 34px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, var(--teal), var(--navy-soft));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      z-index: 2;
    }

    .founder-image {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      border: 4px solid var(--white);
      background: var(--white);
    }

    .founder-card h2 {
      margin: 12px 0 12px;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .founder-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.55;
    }

    .founder-card .founder-title {
      color: var(--teal);
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 28px;
    }

    .stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .stat strong {
      display: block;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      color: var(--white);
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: rgba(255,255,255,0.62);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .principles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      grid-auto-rows: auto;
    }

    .value-card {
      padding: 20px;
      min-height: 170px;
      height: auto;
      display: flex;
      flex-direction: column;
    }

    .value-card h3 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .value-card p {
      margin: 0;
      color: rgba(46, 55, 64, 0.72);
      line-height: 1.5;
    }

    .process-wrap {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 14px;
      align-items: stretch;
    }

    .process-map {
      padding: 18px;
      border-radius: 28px;
      background: var(--white);
      box-shadow: var(--shadow);
      border: 1px solid rgba(7, 26, 45, 0.08);
    }

    .process-step {
      display: block;
      padding: 12px 0;
      border-bottom: 1px solid rgba(7,26,45,0.08);
    }

    .process-step:last-child { border-bottom: none; }

    .process-step h3 {
      margin: 0 0 5px;
      color: var(--navy);
      letter-spacing: -0.03em;
      font-size: 1rem;
      line-height: 1.25;
    }

    .process-step p {
      margin: 0;
      color: rgba(46,55,64,0.72);
      line-height: 1.42;
      font-size: 0.88rem;
    }

    .dark-card {
      padding: 18px;
      border-radius: 28px;
      background: linear-gradient(145deg, var(--navy), var(--navy-soft));
      color: var(--white);
      box-shadow: var(--shadow);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .dark-card h3 {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 1.85rem);
      letter-spacing: -0.045em;
      line-height: 1.08;
    }

    .dark-card p {
      color: rgba(255,255,255,0.72);
      line-height: 1.42;
      margin: 0;
      font-size: 0.88rem;
    }

    .dark-card .mini-list {
      gap: 10px;
    }

    .dark-card .mini-list li {
      color: rgba(255,255,255,0.78);
      font-size: 0.86rem;
      line-height: 1.36;
    }

    .testimonials {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .testimonial-card {
      padding: 28px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .quote {
      margin: 0;
      color: var(--navy);
      line-height: 1.48;
      font-size: 1.02rem;
      font-weight: 720;
      letter-spacing: -0.018em;
      min-height: 118px;
      position: relative;
      padding-top: 42px;
    }

    .quote::before {
      content: "“";
      position: absolute;
      top: -14px;
      left: -4px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 5.6rem;
      line-height: 1;
      color: rgba(61,167,162,0.30);
    }

    .quote::after {
      content: "”";
      font-family: Georgia, "Times New Roman", serif;
      color: rgba(61,167,162,0.58);
      font-size: 1.45em;
      line-height: 0;
      margin-left: 2px;
      vertical-align: -0.08em;
    }

    .person strong {
      display: block;
      color: var(--navy);
      margin-bottom: 4px;
      font-weight: 820;
    }

    .person span {
      color: rgba(46,55,64,0.62);
      font-size: 0.9rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }

    .contact-card {
      padding: 18px;
      border-radius: 36px;
      background: var(--navy);
      color: var(--white);
      box-shadow: var(--shadow);
    }

    .contact-card h2 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 3.2vw, 3.25rem);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .contact-card p {
      margin: 0 0 28px;
      color: rgba(255,255,255,0.7);
      line-height: 1.65;
    }

    .contact-list {
      display: grid;
      gap: 14px;
      margin-top: 26px;
    }

    .contact-item {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .contact-item span {
      display: block;
      color: rgba(255,255,255,0.56);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 7px;
    }

    .contact-item strong,
    .contact-item a {
      color: var(--white);
      text-decoration: none;
      font-size: 1rem;
    }

    .form-card {
      padding: 18px;
      border-radius: 36px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(7,26,45,0.08);
      box-shadow: 0 20px 50px rgba(7, 26, 45, 0.07);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(46,55,64,0.65);
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(7,26,45,0.12);
      border-radius: 18px;
      padding: 15px 16px;
      font: inherit;
      background: rgba(255,255,255,0.9);
      color: var(--navy);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: rgba(31,127,122,0.55);
      box-shadow: 0 0 0 4px rgba(61,167,162,0.12);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .full { grid-column: 1 / -1; }

    footer {
      padding: 46px 0 38px;
      color: rgba(46, 55, 64, 0.7);
    }

    .footer-card {
      padding: 18px;
      border-radius: 36px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(7, 26, 45, 0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      box-shadow: 0 20px 50px rgba(7,26,45,0.06);
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      justify-content: flex-end;
      font-size: 0.9rem;
    }

    .footer-links a {
      color: rgba(46,55,64,0.68);
      text-decoration: none;
    }

    .footer-links a:hover { color: var(--navy); }

    .mark-small {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      overflow: hidden;
      display: block;
    }

    .nav .mark-small {
      width: 62px;
      height: 62px;
    }

    .nav-logo-line {
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: drawLine 1.15s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .nav-logo-line.delay-1 { animation-delay: 0.12s; }
    .nav-logo-line.delay-2 { animation-delay: 0.24s; }
    .nav-logo-line.delay-3 { animation-delay: 0.36s; }

    .nav-logo-node {
      opacity: 0;
      transform-origin: center;
      animation: nodeIn 420ms ease forwards;
    }

    .nav-logo-node.delay-1 { animation-delay: 0.08s; }
    .nav-logo-node.delay-2 { animation-delay: 0.26s; }
    .nav-logo-node.delay-3 { animation-delay: 0.44s; }
    .nav-logo-node.delay-4 { animation-delay: 0.62s; }

    @media (max-width: 1180px) {
      .hero {
